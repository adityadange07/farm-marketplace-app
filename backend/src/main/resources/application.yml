server:
  port: 9090
  servlet:
    context-path: /api

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

spring:
  # ══════════════════════════════════════
  # MySQL DATABASE
  # ══════════════════════════════════════
  datasource:
    url: jdbc:mysql://localhost:3306/farmmarket?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:seaface}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        type.preferred_uuid_jdbc_type: CHAR
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

  # ── Flyway ───────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # ── Email ────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:dummy_mail_user}
    password: ${MAIL_PASSWORD:dummy_mail_pass}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true

  # ── File Upload ──────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# ── JWT ──────────────────────────
jwt:
  secret: ${JWT_SECRET:mySecretKey12345678901234567890123456789012}
  access-expiration: 900000
  refresh-expiration: 604800000

# ── Stripe ───────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY:dummy_stripe_key}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:dummy_webhook_secret}

# ── AWS S3 ───────────────────────
aws:
  s3:
    bucket: ${S3_BUCKET:farm-marketplace}
    region: ${S3_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY:dummy_access}
    secret-key: ${AWS_SECRET_KEY:dummy_secret}

# ── Swagger ──────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Actuator Endpoints ─────────────────────
management:
  endpoints:
    web:
      exposure:
        include: >
          health, info, metrics, prometheus,
          loggers, caches, scheduledtasks,
          env, flyway, mappings
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true            # Kubernetes liveness/readiness
    prometheus:
      enabled: true
    loggers:
      enabled: true              # Runtime log level change

  # ── Metrics ──────────────────────────────
  metrics:
    tags:
      application: farm-marketplace
      environment: ${SPRING_PROFILES_ACTIVE:dev}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.90, 0.95, 0.99
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 5s
    enable:
      jvm: true
      system: true
      process: true
      tomcat: true
      jdbc: true
      hibernate: true

  # ── Tracing ──────────────────────────────
  tracing:
    sampling:
      probability: 1.0           # 100% in dev, reduce in prod
    enabled: true

  # ── Health Groups ────────────────────────
  health:
    db:
      enabled: true
    redis:
      enabled: true
    diskspace:
      enabled: true
    mail:
      enabled: false             # Don't fail health on mail

  # ── Info Endpoint ────────────────────────
  info:
    env:
      enabled: true

# ── Tracing Export (Tempo) ─────────────────
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_ENDPOINT:http://localhost:4318}
  resource:
    attributes:
      service.name: farm-marketplace-api
      service.version: 1.0.0

# ── App Info ───────────────────────────────
info:
  app:
    name: Farm Marketplace API
    version: 1.0.0
    description: Farm-to-Consumer Direct Marketplace
  java:
    version: ${java.version}

# ── Logging ────────────────────────────────
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} - %msg%n"
  level:
    com.farmmarket: DEBUG
    org.hibernate.SQL: DEBUG
    io.micrometer: INFO