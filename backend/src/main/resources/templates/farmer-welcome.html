<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0"
       style="max-width:600px;margin:0 auto;background:#fff;">
    <tr>
        <td style="background:#16a34a;padding:30px;text-align:center;">
            <h1 style="color:#fff;margin:0;">🌾 FarmFresh</h1>
        </td>
    </tr>
    <tr>
        <td style="padding:40px 30px;">
            <h2 style="color:#333;margin:0 0 15px;">
                Welcome, <span th:text="${name}">Farmer</span>! 🌱
            </h2>
            <p style="color:#666;font-size:15px;line-height:1.6;">
                Your farm <strong th:text="${farmName}">Farm</strong> is now
                live on FarmFresh! Here's how to get started:
            </p>

            <div style="margin:25px 0;">
                <div style="padding:15px 0;border-bottom:1px solid #eee;">
                    <strong style="color:#16a34a;">Step 1:</strong>
                    <span style="color:#666;"> Add your products</span>
                </div>
                <div style="padding:15px 0;border-bottom:1px solid #eee;">
                    <strong style="color:#16a34a;">Step 2:</strong>
                    <span style="color:#666;"> Set up Stripe for payments</span>
                </div>
                <div style="padding:15px 0;">
                    <strong style="color:#16a34a;">Step 3:</strong>
                    <span style="color:#666;"> Start receiving orders!</span>
                </div>
            </div>

            <div style="text-align:center;margin:30px 0;">
                <a th:href="${addProductUrl}"
                   style="background:#16a34a;color:#fff;padding:14px 40px;
                          text-decoration:none;border-radius:8px;
                          font-weight:bold;margin-right:10px;">
                    Add Products
                </a>
                <a th:href="${dashboardUrl}"
                   style="color:#16a34a;padding:14px 20px;
                          text-decoration:none;font-weight:bold;">
                    View Dashboard →
                </a>
            </div>
        </td>
    </tr>
    <tr>
        <td style="background:#f9f9f9;padding:20px 30px;text-align:center;
                    border-top:1px solid #eee;">
            <p style="color:#999;font-size:12px;margin:0;">
                © <span th:text="${year}">2024</span> FarmFresh Marketplace
            </p>
        </td>
    </tr>
</table>
</body>
</html>
