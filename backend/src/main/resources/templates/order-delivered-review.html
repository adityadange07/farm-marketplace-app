<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0"
       style="max-width:600px;margin:0 auto;background:#fff;">
    <tr>
        <td style="background:#16a34a;padding:30px;text-align:center;">
            <h1 style="color:#fff;margin:0;">🌾 FarmFresh</h1>
        </td>
    </tr>
    <tr>
        <td style="padding:40px 30px;text-align:center;">
            <p style="font-size:48px;margin:0 0 10px;">✅</p>
            <h2 style="color:#333;margin:0 0 15px;">Your Order Was Delivered!</h2>
            <p style="color:#666;font-size:15px;">
                Hi <span th:text="${consumerName}">Customer</span>,
                your order <strong th:text="${orderNumber}">FM-XXXXX</strong>
                from <strong th:text="${farmName}">Farm</strong> has been delivered.
            </p>
            <p style="color:#666;font-size:15px;margin-top:20px;">
                How was everything? Your feedback helps farmers improve!
            </p>

            <!-- Star Rating Visual -->
            <div style="margin:25px 0;">
                <span style="font-size:32px;">⭐⭐⭐⭐⭐</span>
            </div>

            <a th:href="${reviewUrl}"
               style="background:#f59e0b;color:#fff;padding:14px 40px;
                      text-decoration:none;border-radius:8px;
                      font-weight:bold;font-size:16px;display:inline-block;">
                Leave a Review
            </a>
            <p style="color:#999;font-size:13px;margin-top:25px;">
                Thank you for supporting local farmers! 🌱
            </p>
        </td>
    </tr>
    <tr>
        <td style="background:#f9f9f9;padding:20px 30px;text-align:center;
                    border-top:1px solid #eee;">
            <p style="color:#999;font-size:12px;margin:0;">
                © <span th:text="${year}">2024</span> FarmFresh Marketplace
            </p>
        </td>
    </tr>
</table>
</body>
</html>
