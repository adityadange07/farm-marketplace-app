global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
    - match:
        severity: warning
      receiver: "warning-alerts"

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://api:9090/api/webhooks/alerts"
        send_resolved: true

  - name: "critical-alerts"
    webhook_configs:
      - url: "http://api:9090/api/webhooks/alerts"
        send_resolved: true
    # Slack (uncomment and configure):
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/xxx"
    #     channel: "#farm-alerts"
    #     title: "🚨 {{ .GroupLabels.alertname }}"
    #     text: "{{ .CommonAnnotations.summary }}"

  - name: "warning-alerts"
    webhook_configs:
      - url: "http://api:9090/api/webhooks/alerts"
        send_resolved: true