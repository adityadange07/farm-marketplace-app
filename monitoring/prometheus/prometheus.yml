global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # ── Spring Boot App ─────────────
  - job_name: "farm-marketplace-api"
    metrics_path: "/api/actuator/prometheus"
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8080"]
        labels:
          application: "farm-marketplace"
          component: "api"

  # ── Prometheus Self ─────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Node Exporter ───────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── cAdvisor ────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # ── MySQL Exporter ──────────────
  - job_name: "mysql-exporter"
    static_configs:
      - targets: ["mysql-exporter:9104"]

  # ── Redis Exporter ──────────────
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]