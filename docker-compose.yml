version: '3.8'

services:

  # ═══════════════════════════════════════
  # Spring Boot API
  # ═══════════════════════════════════════
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:9090"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: farmmarket
      DB_USERNAME: farmuser
      DB_PASSWORD: ${DB_PASSWORD:-farmpass123}
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  # ═══════════════════════════════════════
  # React Frontend
  # ═══════════════════════════════════════
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

  # ══════════════════════════════════
  # MySQL 8.0
  # ══════════════════════════════════
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: farmmarket
      MYSQL_USER: farmuser
      MYSQL_PASSWORD: ${DB_PASSWORD:-farmpass123}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
      - --log-bin-trust-function-creators=1
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  # Redis
  # ═══════════════════════════════════════
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  # ═══════════════════════════════════════
  # phpMyAdmin (dev only)
  # ═══════════════════════════════════════
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8888:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    depends_on:
      - mysql
    profiles:
      - dev

  # ═══════════════════════════════════════
  # Nginx
  # ═══════════════════════════════════════
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - web

  # ═══════════════════════════════════════
  # PROMETHEUS — Metrics Collection
  # ═══════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: always
    networks:
      - monitoring

  # ═══════════════════════════════════════
  # GRAFANA — Dashboards & Visualization
  # ═══════════════════════════════════════
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3333:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3333
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    restart: always
    networks:
      - monitoring

  # ═══════════════════════════════════════
  # LOKI — Log Aggregation
  # ═══════════════════════════════════════
  loki:
    image: grafana/loki:2.9.5
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: always
    networks:
      - monitoring

  # ═══════════════════════════════════════
  # TEMPO — Distributed Tracing
  # ═══════════════════════════════════════
  tempo:
    image: grafana/tempo:2.4.0
    container_name: tempo
    ports:
      - "3200:3200"     # Tempo API
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    volumes:
      - ./monitoring/tempo/tempo-config.yml:/etc/tempo/tempo.yaml
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/tempo.yaml
    restart: always
    networks:
      - monitoring

  # ═══════════════════════════════════════
  # ALERTMANAGER — Alert Routing
  # ═══════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    restart: always
    networks:
      - monitoring

  # ═══════════════════════════════════════
  # NODE EXPORTER — Host Metrics
  # ═══════════════════════════════════════
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: always
    networks:
      - monitoring

  # ═══════════════════════════════════════
  # cADVISOR — Container Metrics
  # ═══════════════════════════════════════
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    ports:
      - "8181:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: always
    networks:
      - monitoring

  # ═══════════════════════════════════════
  # MYSQL EXPORTER — DB Metrics
  # ═══════════════════════════════════════
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: mysql-exporter
    ports:
      - "9104:9104"
    environment:
      DATA_SOURCE_NAME: "exporter:exporterpass@(mysql:3306)/farmmarket"
    depends_on:
      - mysql
    restart: always
    networks:
      - monitoring

  # ═══════════════════════════════════════
  # REDIS EXPORTER — Cache Metrics
  # ═══════════════════════════════════════
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    restart: always
    networks:
      - monitoring

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  monitoring:
    driver: bridge
